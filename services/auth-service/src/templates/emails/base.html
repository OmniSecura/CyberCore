<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}{{ app_name }}{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d0d0f; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; color: #e2e2e5; -webkit-font-smoothing: antialiased; }
    .wrapper { width: 100%; padding: 48px 16px; background: #0d0d0f; }
    .card { max-width: 560px; margin: 0 auto; background: #17171a; border: 1px solid #2a2a2f; border-radius: 12px; overflow: hidden; }
    .header { padding: 28px 40px; border-bottom: 1px solid #2a2a2f; display: flex; align-items: center; gap: 10px; }
    .logo-mark { width: 28px; height: 28px; background: linear-gradient(135deg, #00e5ff 0%, #7b2fff 100%); border-radius: 7px; display: inline-block; flex-shrink: 0; }
    .logo-text { font-size: 16px; font-weight: 700; letter-spacing: -0.02em; color: #ffffff; }
    .body { padding: 40px 40px 32px; }
    .eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #00e5ff; margin-bottom: 12px; }
    h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.03em; color: #ffffff; line-height: 1.25; margin-bottom: 16px; }
    p { font-size: 15px; line-height: 1.65; color: #9999a8; margin-bottom: 14px; }
    p strong { color: #e2e2e5; font-weight: 600; }
    .btn-wrap { margin: 32px 0; }
    .btn { display: inline-block; padding: 13px 28px; background: linear-gradient(135deg, #00e5ff 0%, #7b2fff 100%); color: #ffffff !important; text-decoration: none; font-size: 14px; font-weight: 700; border-radius: 8px; }
    .fallback { font-size: 13px; color: #55555f; line-height: 1.6; word-break: break-all; margin-top: 8px; }
    .fallback a { color: #00e5ff; text-decoration: none; }
    .divider { border: none; border-top: 1px solid #2a2a2f; margin: 28px 0; }
    .notice { background: #1e1e23; border-left: 3px solid #7b2fff; border-radius: 0 6px 6px 0; padding: 14px 16px; }
    .notice p { font-size: 13px; color: #77778a; margin-bottom: 0; }
    .footer { padding: 20px 40px 28px; border-top: 1px solid #2a2a2f; }
    .footer p { font-size: 12px; color: #44444f; margin-bottom: 4px; }
    .footer a { color: #55556a; text-decoration: none; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="card">
      <div class="header">
        <span class="logo-mark"></span>
        <span class="logo-text">{{ app_name }}</span>
      </div>
      <div class="body">
        {% block content %}{% endblock %}
      </div>
      <div class="footer">
        <p>© 2025 {{ app_name }}. All rights reserved.</p>
        <p>You received this because an action was taken on your {{ app_name }} account.</p>
        <p>Didn't request this? <a href="{{ app_url }}">Contact support</a>.</p>
      </div>
    </div>
  </div>
</body>
</html>
